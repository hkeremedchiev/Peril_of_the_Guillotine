<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Peril of the Guillotine - Character Creation</title>
    <style>
        :root {
            --parchment: #f4e4bc;
            --ink: #2c241e;
            --accent: #8b0000; /* Revolutionary Red */
        }

        body {
            background-color: #0a0a0a; /* Dark background like the Paris streets */
            color: var(--ink);
            font-family: 'Crimson Text', 'Georgia', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* The Passport Container */
        #passport {
            background: var(--parchment);
            width: 90%;
            max-width: 500px;
            padding: 40px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8), inset 0 0 100px rgba(0,0,0,0.1);
            border: 2px solid #d4c4a8;
            position: relative;
            transform: rotate(-1deg); /* Slight tilt for that "found document" feel */
        }

        /* Flickering Lantern Effect */
        #passport::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 50% 50%, rgba(255,165,0,0.05), transparent);
            pointer-events: none;
            animation: flicker 4s infinite;
        }

        h1 {
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 2px solid var(--ink);
            padding-bottom: 10px;
            margin-top: 0;
        }

        .instruction {
            font-style: italic;
            text-align: center;
            margin-bottom: 30px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .stat-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        button.stat-btn {
            background: var(--ink);
            color: var(--parchment);
            border: none;
            width: 30px;
            height: 30px;
            cursor: pointer;
            font-size: 1.2rem;
            border-radius: 3px;
        }

        button.stat-btn:hover { background: var(--accent); }

        #points-left {
            text-align: center;
            font-size: 1.5rem;
            color: var(--accent);
            margin-top: 30px;
            border-top: 1px solid rgba(0,0,0,0.1);
            padding-top: 10px;
        }

        #confirm-btn {
            display: block;
            width: 100%;
            margin-top: 30px;
            padding: 15px;
            background: var(--ink);
            color: var(--parchment);
            text-transform: uppercase;
            letter-spacing: 3px;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            transition: 0.3s;
        }

        #confirm-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        #confirm-btn:hover:not(:disabled) { background: var(--accent); }

        @keyframes flicker {
            0% { opacity: 0.8; } 50% { opacity: 1; } 100% { opacity: 0.8; }
        }
    </style>
</head>
<body>

<div id="passport">
    <h1>Carte d'Identité</h1>
    <p class="instruction">Assign your attributes, Citizen. The Committee is watching.</p>
    
    <div id="stats-container">
        <div class="stat-row">
            <span>WEALTH</span>
            <div class="stat-controls">
                <button class="stat-btn" onclick="changeStat('w', -1)">-</button>
                <span id="w-val">5</span>
                <button class="stat-btn" onclick="changeStat('w', 1)">+</button>
            </div>
        </div>
        <div class="stat-row">
            <span>INTELLIGENCE</span>
            <div class="stat-controls">
                <button class="stat-btn" onclick="changeStat('i', -1)">-</button>
                <span id="i-val">5</span>
                <button class="stat-btn" onclick="changeStat('i', 1)">+</button>
            </div>
        </div>
        <div class="stat-row">
            <span>STRENGTH</span>
            <div class="stat-controls">
                <button class="stat-btn" onclick="changeStat('s', -1)">-</button>
                <span id="s-val">5</span>
                <button class="stat-btn" onclick="changeStat('s', 1)">+</button>
            </div>
        </div>
        <div class="stat-row">
            <span>ELEGANCE</span>
            <div class="stat-controls">
                <button class="stat-btn" onclick="changeStat('e', -1)">-</button>
                <span id="e-val">5</span>
                <button class="stat-btn" onclick="changeStat('e', 1)">+</button>
            </div>
        </div>
    </div>

    <div id="points-left">Points Remaining: <span id="pool">20</span></div>
    
    <button id="confirm-btn" disabled onclick="startGame()">Confirm Identity</button>
</div>

<script>
    let stats = { w: 5, i: 5, s: 5, e: 5 };
    let pool = 20;

    function changeStat(stat, change) {
        if (change > 0 && pool > 0) {
            stats[stat]++;
            pool--;
        } else if (change < 0 && stats[stat] > 5) {
            stats[stat]--;
            pool++;
        }
        updateDisplay();
    }

    function updateDisplay() {
        document.getElementById('w-val').innerText = stats.w;
        document.getElementById('i-val').innerText = stats.i;
        document.getElementById('s-val').innerText = stats.s;
        document.getElementById('e-val').innerText = stats.e;
        document.getElementById('pool').innerText = pool;
        
        // Only enable button when all points are spent
        document.getElementById('confirm-btn').disabled = (pool > 0);
    }

    function startGame() {
        alert("Passport Verified. Entering the Rue Saint-Honoré...");
        // This is where we would trigger the Scene 001 logic!
    }
</script>

</body>
</html>
