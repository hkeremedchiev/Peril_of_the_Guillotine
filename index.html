<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peril of the Guillotine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="intro-container">
    <div id="status-bar" style="display: none;">
        <div class="stat-item">❤️ Health: <span id="val-health">10</span></div>
        <div class="stat-item">💰 Gold: <span id="val-gold">5</span></div>
        <div class="stat-item">👁️ Suspicion: <span id="val-suspicion">0</span></div>
        <div class="stat-spacer"></div>
        <div class="stat-item p-color">P: <span id="val-prowess">0</span></div>
        <div class="stat-item r-color">R: <span id="val-rhetoric">0</span></div>
        <div class="stat-item s-color">S: <span id="val-subterfuge">0</span></div>
    </div>

    <div id="start-prompt-container">
        <h1 id="game-setting">Paris, 1793</h1>
        <button id="start-btn" class="game-btn">Begin the Trial</button>
        <button id="continue-btn" class="game-btn" style="margin-top: 10px; font-size: 1rem; opacity: 0.8; display: none;">Continue Mission</button>
    </div>

    <div id="image-layer"></div>
    <div id="vignette"></div>
    <div id="text-overlay"></div>
</div>

<script src="script.js"></script>
</body>
</html>
